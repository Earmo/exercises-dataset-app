name: Build Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to upload the APK to
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and upload APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: |
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          sdk_manager="$sdk_root/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -x "$sdk_manager" ]; then
            echo "::error::sdkmanager not found at $sdk_manager"
            find /usr/local/lib/android -path "*/sdkmanager" -type f -print || true
            exit 1
          fi

          yes | "$sdk_manager" --licenses >/dev/null
          "$sdk_manager" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore release signing key
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ] || \
             [ -z "$ANDROID_RELEASE_STORE_PASSWORD" ] || \
             [ -z "$ANDROID_RELEASE_KEY_ALIAS" ] || \
             [ -z "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            echo "::error::Missing Android signing secrets. Configure ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_STORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS and ANDROID_RELEASE_KEY_PASSWORD."
            exit 1
          fi

          mkdir -p keystore
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > keystore/release.jks
          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=$ANDROID_RELEASE_STORE_PASSWORD"
            echo "keyAlias=$ANDROID_RELEASE_KEY_ALIAS"
            echo "keyPassword=$ANDROID_RELEASE_KEY_PASSWORD"
          } > key.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release asset
        run: |
          tag="$RELEASE_TAG"
          safe_tag="${tag//\//-}"
          cp app/build/outputs/apk/release/app-release.apk "exercises-dataset-app-${safe_tag}.apk"
          echo "APK_PATH=exercises-dataset-app-${safe_tag}.apk" >> "$GITHUB_ENV"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" \
              --title "$RELEASE_TAG" \
              --notes "自动构建的 Android APK" \
              --repo "$GITHUB_REPOSITORY"
          fi
